services:
  postpilot:
    build: .
    container_name: postpilot
    restart: unless-stopped
    volumes:
      - postpilot_data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////app/data/postpilot.db
      - UPLOAD_DIR=/app/data/uploads

volumes:
  postpilot_data:
